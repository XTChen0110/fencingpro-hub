<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FencingPro Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter';
  background:#0b0b0b;
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:black;
}

/* HERO */
.hero{
  padding:120px 40px;
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1603570419887-3d4b2d3a3c8c?auto=format&fit=crop&w=1600&q=80');
  background-size:cover;
}
.hero h1{
  font-size:60px;
}

/* TABLE */
.table-container{
  padding:40px;
}
table{
  width:100%;
  border-collapse:collapse;
}
td,th{
  padding:14px;
  border-bottom:1px solid #222;
}
tr:hover{
  background:#111;
  cursor:pointer;
}
.rank{
  color:#d4af37;
  font-weight:bold;
}

/* ANALYSIS */
.card{
  background:#111;
  padding:20px;
  margin:20px;
  border-radius:10px;
  display:inline-block;
  width:250px;
}

/* BADGE */
.badge{
  padding:5px 10px;
  border-radius:5px;
  font-size:12px;
}
.hot{background:#d4af37;color:black;}
.stable{background:#444;}
.risk{background:#a33;}
</style>
</head>

<body>

<nav>
  <h2>FencingPro Hub</h2>
  <div>Rankings | Players | Gear</div>
</nav>

<div class="hero">
  <h1>Fencing Rankings. Smarter.</h1>
  <p>AI-driven insights powered by USA Fencing data</p>
</div>

<div class="table-container">
  <h2>Top Rankings</h2>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Weapon</th>
        <th>Points</th>
        <th>Win Rate</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="ranking"></tbody>
  </table>
</div>

<h2 style="padding-left:40px">Player Insights</h2>
<div id="analysis"></div>

<script>
fetch("data.json")
.then(res => res.json())
.then(data => {

  let table="";
  let analysis="";

  data.forEach((p,i)=>{

    let winRate = Math.round(p.wins / p.matches * 100);

    let status="stable";
    let label="Stable";

    if(winRate > 80){status="hot"; label="Hot";}
    else if(winRate < 50){status="risk"; label="Risk";}

    table += `
      <tr onclick="goPlayer('${p.name}')">
        <td class="rank">#${i+1}</td>
        <td>${p.name}</td>
        <td>${p.weapon}</td>
        <td>${p.points}</td>
        <td>${winRate}%</td>
        <td><span class="badge ${status}">${label}</span></td>
      </tr>
    `;

    let style = winRate > 70 ? "Aggressive" : "Defensive";

    analysis += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>Win Rate: ${winRate}%</p>
        <p>Style: ${style}</p>
        <p>Status: ${label}</p>
      </div>
    `;
  });

  document.getElementById("ranking").innerHTML = table;
  document.getElementById("analysis").innerHTML = analysis;
});

function goPlayer(name){
  window.location.href = "player.html?name=" + encodeURIComponent(name);
}
</script>

</body>
</html>
