<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FencingPro Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter';
  background:#0b0b0b;
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:black;
}

/* HERO */
.hero{
  padding:100px 40px;
}
.hero h1{
  font-size:60px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}
td,th{
  padding:12px;
  border-bottom:1px solid #222;
}

/* CARD */
.cards{
  display:flex;
  gap:20px;
}
.card{
  background:#111;
  padding:20px;
  border-radius:10px;
}

/* BUTTON */
.btn{
  background:#d4af37;
  padding:10px 20px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <h2>FencingPro Hub</h2>
  <div>Rankings | Players | Gear</div>
</nav>

<div class="hero">
  <h1>Fencing Rankings. Smarter.</h1>
  <p>Powered by USA Fencing data</p>
</div>

<!-- RANKING -->
<h2 style="padding:20px">Top Rankings</h2>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Weapon</th>
<th>Points</th>
<th>Win Rate</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>

<!-- PLAYER ANALYSIS -->
<h2 style="padding:20px">Player Analysis</h2>
<div id="analysis" class="cards"></div>

<!-- GEAR -->
<h2 style="padding:20px">Recommended Gear</h2>

<div class="cards">
  <div class="card">
    <h3>Starter Kit</h3>
    <button class="btn" onclick="window.open('https://www.absolutefencinggear.com')">
      Buy
    </button>
  </div>
</div>

<script>
fetch("data.json")
.then(res => res.json())
.then(data => {

  let table="";
  let analysis="";

  data.forEach((p,i)=>{
    let winRate = Math.round(p.wins / p.matches * 100);

    table += `
      <tr>
        <td>#${i+1}</td>
        <td>${p.name}</td>
        <td>${p.weapon}</td>
        <td>${p.points}</td>
        <td>${winRate}%</td>
      </tr>
    `;

    let style = winRate > 70 ? "Aggressive" : "Defensive";

    analysis += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>Win Rate: ${winRate}%</p>
        <p>Style: ${style}</p>
      </div>
    `;
  });

  document.getElementById("ranking").innerHTML = table;
  document.getElementById("analysis").innerHTML = analysis;
});
</script>

</body>
</html>
