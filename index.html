<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FencingPro Hub</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", sans-serif;
  background: black;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1603570419887-3d4b2d3a3c8c?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
  display: flex;
  align-items: center;
  padding: 60px;
}

.hero-content {
  max-width: 600px;
}

h1 {
  font-size: 64px;
  margin-bottom: 20px;
}

p {
  font-size: 18px;
  opacity: 0.8;
}

.btn {
  margin-top: 20px;
  padding: 14px 28px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.btn-primary {
  background: white;
  color: black;
}

.btn-secondary {
  background: transparent;
  border: 1px solid white;
  color: white;
}

/* SECTION */
.section {
  padding: 80px 20px;
  text-align: center;
}

.card {
  background: #111;
  padding: 30px;
  border-radius: 12px;
  margin: 20px;
  display: inline-block;
  width: 280px;
}

/* FORM */
input, select {
  padding: 12px;
  margin: 10px;
  width: 200px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Built for Champions</h1>
    <p>Premium fencing gear. Smart recommendations. Sell more with better design.</p>

    <button class="btn btn-primary">Find Your Gear</button>
    <button class="btn btn-secondary">Explore Bundles</button>
  </div>
</div>

<!-- GEAR FINDER -->
<div class="section">
  <h2>Find Your Perfect Gear</h2>

  <input id="height" placeholder="Height (cm)">
  <select id="level">
    <option>Beginner</option>
    <option>Intermediate</option>
    <option>Competitive</option>
  </select>

  <select id="weapon">
    <option>Foil</option>
    <option>Epee</option>
    <option>Sabre</option>
  </select>

  <br>
  <button class="btn btn-primary" onclick="recommend()">Get Recommendation</button>

  <p id="result"></p>
</div>

<!-- BUNDLES -->
<div class="section">
  <h2>Featured Bundles</h2>

  <div class="card">
    <h3>Starter Kit</h3>
    <p>Everything you need to start</p>
    <strong>$299</strong>
  </div>

  <div class="card">
    <h3>Performance Kit</h3>
    <p>Best for serious training</p>
    <strong>$699</strong>
  </div>

  <div class="card">
    <h3>Elite Kit</h3>
    <p>For competitive fencers</p>
    <strong>$1199</strong>
  </div>
</div>

<script>
function recommend() {
  const level = document.getElementById("level").value;

  let result = "";

  if (level === "Beginner") {
    result = "Starter Kit - $299 (Recommended)";
  } else if (level === "Intermediate") {
    result = "Performance Kit - $699 (Recommended)";
  } else {
    result = "Elite Kit - $1199 (Recommended)";
  }

  document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
